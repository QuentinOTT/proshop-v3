version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: proshop-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - proshop-network
    restart: unless-stopped

  mongo:
    image: mongo:latest
    container_name: proshop-mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - proshop-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proshop-backend
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/proshop
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - proshop-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proshop-frontend
    depends_on:
      - backend
    networks:
      - proshop-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  proshop-network:
    driver: bridge
