name: CI/CD Pipeline - ProShop

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/proshop-backend
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/proshop-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Installation des dépendances + Tests
  # ─────────────────────────────────────────
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupération du code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 3. Installation des dépendances backend
        run: npm install

      - name: 4. Installation des dépendances frontend
        run: npm install --prefix frontend

      - name: 5. Tests backend
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: 6. Tests frontend
        run: npm test --prefix frontend --if-present -- --watchAll=false --passWithNoTests

  # ─────────────────────────────────────────
  # JOB 2 — Build + Scan sécurité + Push
  # ─────────────────────────────────────────
  build:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 1. Récupération du code
        uses: actions/checkout@v4

      - name: 2. Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. Build image backend
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_BACKEND }}:latest \
                       -t ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }} \
                       -f Dockerfile .

      - name: 4. Build image frontend
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_FRONTEND }}:latest \
                       -t ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }} \
                       -f frontend/Dockerfile ./frontend

      - name: 5. Scan vulnérabilités image backend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: 6. Scan vulnérabilités image frontend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: 7. Push images vers Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          docker push ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          docker push ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 3 — Déploiement avec Docker Compose (simulation)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 1. Récupération du code
        uses: actions/checkout@v4

      - name: 2. Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. Pull des images Docker depuis la registry
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/proshop-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/proshop-frontend:latest

      - name: 4. Validation de la configuration Docker Compose
        run: |
          echo "Déploiement de ProShop en cours..."
          docker compose -f docker-compose.yml config
          echo "Configuration Docker Compose validée"
          echo "Services prêts à être déployés :"
          docker compose -f docker-compose.yml config --services

      - name: 5. Health check (simulation)
        run: |
          echo "Vérification de l'état des services..."
          echo "Backend : OK"
          echo "Frontend : OK"
          echo "MongoDB : OK"
          echo "Nginx : OK"
          echo "Déploiement terminé avec succès !"