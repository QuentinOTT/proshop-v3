name: CI/CD Pipeline - ProShop

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/proshop-backend
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/proshop-frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Installation des dépendances + Tests
  # ─────────────────────────────────────────
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupération du code
        uses: actions/checkout@v3

      - name: 2. Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: 3. Installation des dépendances backend
        run: npm install

      - name: 4. Installation des dépendances frontend
        run: npm install --prefix frontend

      - name: 5. Tests backend
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: 6. Tests frontend
        run: npm test --prefix frontend --if-present -- --watchAll=false

  # ─────────────────────────────────────────
  # JOB 2 — Build des images Docker
  # ─────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 1. Récupération du code
        uses: actions/checkout@v3

      - name: 2. Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. Build image backend
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_BACKEND }}:latest \
                       -t ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }} \
                       -f Dockerfile .

      - name: 4. Build image frontend
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_FRONTEND }}:latest \
                       -t ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }} \
                       -f frontend/Dockerfile ./frontend

      - name: 5. Push images vers Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          docker push ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          docker push ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 3 — Analyse de sécurité (Trivy)
  # ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 1. Récupération du code
        uses: actions/checkout@v3

      - name: 2. Scan vulnérabilités image backend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

      - name: 3. Scan vulnérabilités image frontend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL

  # ─────────────────────────────────────────
  # JOB 4 — Déploiement avec Docker Compose
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 1. Récupération du code
        uses: actions/checkout@v3

      - name: 2. Déploiement via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /app/proshop
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose ps